name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Write env files and deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # ── App directories ──────────────────────────────────────────
            mkdir -p /opt/chat-wonder-v2/resources/functions

            # ── Write .env (main app config) ─────────────────────────────
            cat > /opt/chat-wonder-v2/.env << 'ENVEOF'
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            CHAT_MODEL=${{ secrets.CHAT_MODEL }}
            LEGAL_DATABASE_URL=${{ secrets.LEGAL_DATABASE_URL }}
            LEGAL_S3_BUCKET_NAME=${{ secrets.LEGAL_S3_BUCKET_NAME }}
            LEGAL_S3_PREFIX=${{ secrets.LEGAL_S3_PREFIX }}
            LEGAL_EMBEDDING_MODEL=${{ secrets.LEGAL_EMBEDDING_MODEL }}
            LEGAL_CHAT_MODEL=${{ secrets.LEGAL_CHAT_MODEL }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            ENVEOF

            # ── Write user_functions.env (legal RAG credentials) ─────────
            # Mounted into the container at resources/functions/user_functions.env
            cat > /opt/chat-wonder-v2/resources/functions/user_functions.env << 'FUNCEOF'
            LEGAL_DATABASE_URL=${{ secrets.LEGAL_DATABASE_URL }}
            LEGAL_S3_BUCKET_NAME=${{ secrets.LEGAL_S3_BUCKET_NAME }}
            LEGAL_S3_PREFIX=${{ secrets.LEGAL_S3_PREFIX }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            LEGAL_EMBEDDING_MODEL=${{ secrets.LEGAL_EMBEDDING_MODEL }}
            LEGAL_CHAT_MODEL=${{ secrets.LEGAL_CHAT_MODEL }}
            FUNCEOF

            # ── Authenticate EC2 to ECR ───────────────────────────────────
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # ── Pull latest image ─────────────────────────────────────────
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

            # ── Stop and remove old container (ignore error if not running)
            docker stop chat-wonder-v2 || true
            docker rm   chat-wonder-v2 || true

            # ── Start new container ───────────────────────────────────────
            docker run -d \
              --name chat-wonder-v2 \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file /opt/chat-wonder-v2/.env \
              -v /opt/chat-wonder-v2/resources/functions/user_functions.env:/app/resources/functions/user_functions.env:ro \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

            # ── Cleanup old images ────────────────────────────────────────
            docker image prune -f
